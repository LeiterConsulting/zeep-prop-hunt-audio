name: Validate audio catalog

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Validate manifest and release files
        run: python tools/validate_manifest.py
