name: Audio submission
description: Propose a new taunt, sound effect, or announcement before opening a pull request.
title: "[Audio]: "
labels:
  - audio-submission
body:
  - type: markdown
    attributes:
      value: |
        Read CONTRIBUTING.md and LICENSES.md first. Do not upload copyrighted media without explicit compatible permission.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Taunt - all roles
        - Taunt - prop
        - Taunt - hunter
        - Weapon or impact
        - Player or disguise
        - UI
        - Round or announcement
        - Other
    validations:
      required: true
  - type: input
    id: proposed_id
    attributes:
      label: Proposed stable ID
      placeholder: taunt.prop.cardboard_confidence
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description and intended use
    validations:
      required: true
  - type: dropdown
    id: ownership
    attributes:
      label: Origin
      options:
        - I created and recorded this audio myself
        - I commissioned this audio and hold redistribution rights
        - This is third-party material under a compatible license
        - This used a disclosed synthetic-generation tool
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author/performer credit
    validations:
      required: true
  - type: dropdown
    id: license
    attributes:
      label: Proposed license
      options:
        - CC0-1.0
        - CC-BY-4.0
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: Source, permission, and provenance
      description: Include URLs and explain why you are authorized to submit it.
    validations:
      required: true
  - type: textarea
    id: transcript
    attributes:
      label: Transcript and caption
      description: Required for speech. Write "Nonverbal" when appropriate.
    validations:
      required: true
  - type: textarea
    id: tooling
    attributes:
      label: Recording, processing, or generation tools
      description: Disclose synthetic generation and its service/model terms.
    validations:
      required: true
  - type: checkboxes
    id: attestations
    attributes:
      label: Attestations
      options:
        - label: I have the right to submit and redistribute this audio under the selected license.
          required: true
        - label: This is not a copied film, television, music, game, streamer, or meme clip without explicit permission.
          required: true
        - label: This does not clone or imitate an identifiable real person or protected character.
          required: true
        - label: I understand that opening an issue does not guarantee acceptance.
          required: true

